<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a1a1a">
  <title>Ежедневник</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Экран авторизации -->
  <section id="auth" class="auth hidden">
    <div class="auth-box">
      <h1>Ежедневник</h1>
      <input id="auth-email" type="email" placeholder="email" autocomplete="email">
      <input id="auth-password" type="password" placeholder="пароль" autocomplete="current-password">
      <button id="btn-login">Войти</button>
      <button id="btn-register" class="ghost">Регистрация</button>
      <p id="auth-error" class="error"></p>
    </div>
  </section>

  <!-- Основной экран -->
  <main id="app" class="hidden">
    <header class="topbar">
      <div class="topbar-row">
        <button id="list-chip" class="list-chip" aria-label="Выбрать список">
          <span id="list-chip-icon">📋</span>
          <span id="list-chip-name">Все списки</span>
          <span class="chevron">▾</span>
        </button>
        <a href="voice.html" class="ghost small" style="text-decoration:none;display:inline-flex;align-items:center;padding:6px 10px;border-radius:8px;border:1px solid var(--border);color:var(--muted);">🎤 Опрос</a>
        <button id="btn-logout" class="ghost small">Выйти</button>
      </div>
      <nav class="tabs">
        <button class="tab" data-view="now">Сейчас</button>
        <button class="tab active" data-view="today">Сегодня</button>
        <button class="tab" data-view="tomorrow">Завтра</button>
        <button class="tab" data-view="week">Неделя</button>
        <button class="tab" data-view="notes">Мысли</button>
        <button class="tab" data-view="goals">Жизнь</button>
        <button class="tab" data-view="lists">Списки</button>
      </nav>
    </header>

    <!-- Баннер-напоминание -->
    <div id="reminder-banner" class="reminder hidden">
      <div class="reminder-main" id="reminder-main"></div>
      <button id="reminder-enable" class="reminder-enable hidden">Включить напоминания</button>
      <button id="reminder-close" class="reminder-close" aria-label="Скрыть">×</button>
    </div>

    <!-- Выпадашка выбора списка -->
    <div id="list-picker" class="picker hidden">
      <div class="picker-backdrop"></div>
      <div class="picker-box">
        <button class="picker-item" data-list-id="">
          <span class="picker-icon">📋</span>
          <span class="picker-name">Все списки</span>
        </button>
        <div id="picker-lists"><!-- сюда подставляются списки --></div>
        <div class="picker-sep"></div>
        <button class="picker-item picker-add" data-action="new-list">
          <span class="picker-icon">＋</span>
          <span class="picker-name">Новый список</span>
        </button>
      </div>
    </div>

    <section id="view-content" class="content">
      <!-- сюда рендерится текущая вкладка -->
    </section>

    <!-- Плавающая кнопка добавления -->
    <button id="btn-add" class="fab" aria-label="Добавить">+</button>

    <!-- Модалка управления списком (создать/редактировать) -->
    <div id="list-modal" class="modal hidden">
      <div class="modal-box">
        <h2 id="list-modal-title">Новый список</h2>
        <label class="full">Название
          <input id="lm-name" type="text" placeholder="Например: Покупки">
        </label>
        <div class="row">
          <label>Иконка (эмодзи)
            <input id="lm-icon" type="text" maxlength="4" placeholder="🛒">
          </label>
          <label>Цвет
            <input id="lm-color" type="color" value="#4f8cff">
          </label>
        </div>
        <div class="emoji-suggest">
          <button type="button" class="emoji-btn">🛒</button>
          <button type="button" class="emoji-btn">💼</button>
          <button type="button" class="emoji-btn">🏠</button>
          <button type="button" class="emoji-btn">📚</button>
          <button type="button" class="emoji-btn">💪</button>
          <button type="button" class="emoji-btn">✈️</button>
          <button type="button" class="emoji-btn">💰</button>
          <button type="button" class="emoji-btn">🎁</button>
          <button type="button" class="emoji-btn">❤️</button>
          <button type="button" class="emoji-btn">🍳</button>
          <button type="button" class="emoji-btn">🔧</button>
          <button type="button" class="emoji-btn">📝</button>
        </div>
        <div class="modal-actions">
          <button id="lm-delete" class="ghost danger hidden">Удалить</button>
          <button id="lm-cancel" class="ghost">Отмена</button>
          <button id="lm-save">Сохранить</button>
        </div>
      </div>
    </div>

    <!-- Модалка добавления -->
    <div id="modal" class="modal hidden">
      <div class="modal-box">
        <h2 id="modal-title">Новая задача</h2>
        <div class="textarea-wrap">
          <textarea id="m-text" placeholder="Что нужно сделать или записать..." rows="3"></textarea>
          <button type="button" id="m-mic" class="mic-btn" title="Надиктовать голосом" aria-label="Надиктовать голосом">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="3" width="6" height="12" rx="3"/>
              <path d="M5 11a7 7 0 0 0 14 0"/>
              <line x1="12" y1="18" x2="12" y2="22"/>
              <line x1="8" y1="22" x2="16" y2="22"/>
            </svg>
          </button>
          <div id="m-mic-hint" class="mic-hint"></div>
        </div>

        <div class="row">
          <label>Дата
            <input id="m-date" type="date">
          </label>
          <label>Время
            <input id="m-time" type="time">
          </label>
        </div>

        <div class="row">
          <label>Повтор
            <select id="m-repeat">
              <option value="">нет</option>
              <option value="daily">каждый день</option>
              <option value="weekly">каждую неделю</option>
              <option value="monthly">каждый месяц</option>
            </select>
          </label>
          <label>Приоритет
            <select id="m-priority">
              <option value="0">обычный</option>
              <option value="1">важно</option>
              <option value="2">срочно</option>
            </select>
          </label>
        </div>

        <label class="full">Список
          <select id="m-list">
            <option value="">(без списка)</option>
          </select>
        </label>

        <div class="modal-tabs">
          <button class="mtab active" data-kind="task">Задача</button>
          <button class="mtab" data-kind="note">Мысль</button>
          <button class="mtab" data-kind="goal">Цель</button>
        </div>

        <div class="modal-actions">
          <button id="m-cancel" class="ghost">Отмена</button>
          <button id="m-save">Сохранить</button>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(()=>{});
    }
  </script>
</body>
</html>
